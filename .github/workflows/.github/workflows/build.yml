name: Build Minecraft Mod

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build mod
        run: |
          cd economycraft_advancement_addon_source
          chmod +x gradlew || true
          if [ -f gradlew ]; then
            ./gradlew build
          else
            gradle build
          fi

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-mod
          path: economycraft_advancement_addon_source/build/libs/*.jar
