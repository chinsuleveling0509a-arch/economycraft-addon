name: Build Minecraft Mod

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Build mod
        run: |
          cd economycraft_advancement_addon_source
          chmod +x gradlew || true
          ./gradlew build || gradle build

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-mod
          path: economycraft_advancement_addon_source/build/libs/*.jar
